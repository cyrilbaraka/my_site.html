
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Sasha | SANYO</title>
    <style>
        /* 1. Matching Lavender Sunset Background */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0c3fc 0%, #fbc2eb 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Glassmorphism Card */
        .hobby-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px;
            width: 85%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #6a4c93;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #8e44ad;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* 3. Aesthetic Hobby List */
        ul {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        li {
            background: rgba(255, 255, 255, 0.5);
            margin: 10px 0;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            color: #444;
            transition: all 0.3s ease;
            cursor: default;
            border: 1px solid transparent;
        }

        li:hover {
            background: white;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(155, 89, 182, 0.2);
            border: 1px solid #e0c3fc;
            color: #6a4c93;
        }

        /* 4. Navigation Link */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #6a4c93;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            letter-spacing: 1px;
            color: #9b59b6;
        }

        /* Emoji Decor */
        .sparkle { color: #f1c40f; }
    </style>
</head>
<body>

    <div class="hobby-card">
        <h2>About Me <span class="sparkle">✨</span></h2>
        <p class="subtitle">My Hobbies & Interests</p>
        
        <ul>
            <li>📚 Reading</li>
            <li>⚽ Playing Football</li>
            <li>👑 Glazing Cyril</li>
            <li>🙏 Glazing Cyril Again</li>
            <li>💅 Going Out</li>
        </ul>

        <a href="index.html" class="back-link">← Back to Main Page</a>
    </div>

</body>
</html>
